name: Scrape Rental Listings

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Which scraper to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - zillow
          - apartments_com
          - streeteasy
      borough:
        description: 'Borough filter (optional, leave empty for all)'
        required: false
        default: ''
        type: string
      pages:
        description: 'Max pages per borough/neighborhood'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: false
        type: boolean

jobs:
  scrape-zillow:
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'zillow' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          patchright install chromium

      - name: Run Zillow scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.borough }}" ]; then
            ARGS="$ARGS --borough=${{ inputs.borough }}"
          fi
          if [ -n "${{ inputs.pages }}" ]; then
            ARGS="$ARGS --pages=${{ inputs.pages }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 scripts/scrape-zillow.py $ARGS

  scrape-apartments-com:
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'apartments_com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          patchright install chromium

      - name: Run Apartments.com scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.borough }}" ]; then
            ARGS="$ARGS --borough=${{ inputs.borough }}"
          fi
          if [ -n "${{ inputs.pages }}" ]; then
            ARGS="$ARGS --pages=${{ inputs.pages }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 scripts/scrape-apartments-com.py $ARGS

  scrape-streeteasy:
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'streeteasy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          patchright install chromium

      - name: Run StreetEasy scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.borough }}" ]; then
            ARGS="$ARGS --borough=${{ inputs.borough }}"
          fi
          if [ -n "${{ inputs.pages }}" ]; then
            ARGS="$ARGS --pages=${{ inputs.pages }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 scripts/scrape-streeteasy.py $ARGS
